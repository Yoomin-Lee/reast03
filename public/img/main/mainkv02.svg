<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111820"/>
      <stop offset="40%" style="stop-color:#1e2d3d"/>
      <stop offset="100%" style="stop-color:#0a1520"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#g1)"/>
  <!-- Diagonal stripes -->
  <line x1="400" y1="0" x2="0" y2="400" stroke="rgba(200,169,110,0.05)" stroke-width="2"/>
  <line x1="800" y1="0" x2="0" y2="800" stroke="rgba(200,169,110,0.05)" stroke-width="2"/>
  <line x1="1200" y1="0" x2="200" y2="1000" stroke="rgba(200,169,110,0.05)" stroke-width="2"/>
  <line x1="1600" y1="0" x2="600" y2="1000" stroke="rgba(200,169,110,0.05)" stroke-width="2"/>
  <line x1="2000" y1="0" x2="1000" y2="1000" stroke="rgba(200,169,110,0.05)" stroke-width="2"/>
  <!-- Circle accent -->
  <circle cx="1600" cy="540" r="380" fill="none" stroke="rgba(200,169,110,0.07)" stroke-width="2"/>
  <circle cx="1600" cy="540" r="280" fill="none" stroke="rgba(200,169,110,0.05)" stroke-width="1"/>
  <circle cx="1600" cy="540" r="180" fill="rgba(200,169,110,0.04)"/>
  <!-- Accent line -->
  <rect x="0" y="0" width="1920" height="4" fill="#c8a96e" opacity="0.6"/>
  <!-- Label -->
  <text x="100" y="900" font-family="Arial,sans-serif" font-size="80" font-weight="900" fill="rgba(255,255,255,0.06)" letter-spacing="8">KV 02</text>
  <text x="100" y="960" font-family="Arial,sans-serif" font-size="24" fill="rgba(200,169,110,0.5)">1920 × 1080  ·  메인 비주얼 슬라이드 2</text>
</svg>
