<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#041c2c"/>
      <stop offset="50%" style="stop-color:#0d3b55"/>
      <stop offset="100%" style="stop-color:#061420"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf7d;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#4caf7d;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#g1)"/>
  <!-- Grid lines -->
  <line x1="0" y1="360" x2="1920" y2="360" stroke="rgba(76,175,125,0.07)" stroke-width="1"/>
  <line x1="0" y1="720" x2="1920" y2="720" stroke="rgba(76,175,125,0.07)" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="1080" stroke="rgba(76,175,125,0.05)" stroke-width="1"/>
  <line x1="1280" y1="0" x2="1280" y2="1080" stroke="rgba(76,175,125,0.05)" stroke-width="1"/>
  <!-- Paw print decoration (main pad + 4 toes) -->
  <ellipse cx="1100" cy="560" rx="90" ry="110" fill="rgba(76,175,125,0.05)" rx="16"/>
  <circle cx="990" cy="430" r="48" fill="rgba(76,175,125,0.05)"/>
  <circle cx="1080" cy="390" r="48" fill="rgba(76,175,125,0.05)"/>
  <circle cx="1175" cy="400" r="48" fill="rgba(76,175,125,0.05)"/>
  <circle cx="1250" cy="450" r="44" fill="rgba(76,175,125,0.05)"/>
  <!-- Heartbeat line -->
  <polyline points="200,540 350,540 400,460 450,620 500,540 600,540 650,480 700,600 750,540 1600,540"
    fill="none" stroke="rgba(76,175,125,0.12)" stroke-width="2"/>
  <!-- Accent top bar -->
  <rect x="0" y="0" width="1920" height="4" fill="#4caf7d" opacity="0.7"/>
  <!-- Glow overlay -->
  <rect x="0" y="0" width="1920" height="500" fill="url(#g2)"/>
  <!-- Label -->
  <text x="100" y="900" font-family="Arial,sans-serif" font-size="80" font-weight="900" fill="rgba(255,255,255,0.04)" letter-spacing="8">KV 01</text>
  <text x="100" y="955" font-family="Arial,sans-serif" font-size="22" fill="rgba(76,175,125,0.5)">1920 × 1080  ·  메인 비주얼 슬라이드 1</text>
</svg>
